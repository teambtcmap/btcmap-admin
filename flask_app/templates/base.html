<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
    <style>
        pre {
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
        #map {
            height: 400px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="{{ url_for('home') }}">BTC Map Admin</a>
        <div class="ml-auto">
            {% if session.get('api_key') %}
                <a href="{{ url_for('logout') }}" class="btn btn-outline-danger">Logout</a>
                <button id="refresh-areas-btn" class="btn btn-outline-primary">Refresh Areas</button>
            {% else %}
                <!-- No button if not logged in -->
            {% endif %}
        </div>
    </nav>

    <div class="container text-center mt-5">
        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="alert-container">
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                                <span aria-hidden="true">&times;</span>
                            </button>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script>
        $(document).ready(function() {
            // Load cached areas from localStorage if available
            if (localStorage.getItem('areas')) {
                console.log('Cached areas:', JSON.parse(localStorage.getItem('areas')));
            }

            // Event listener for the "Refresh Areas" button
            $('#refresh-areas-btn').on('click', function(event) {
                event.preventDefault(); // Prevent default behavior of the button

                $.ajax({
                    url: '{{ url_for("fetch_areas") }}',
                    method: 'POST',
                    success: function(response) {
                        if (response.success) {
                            // Cache areas in localStorage
                            localStorage.setItem('areas', JSON.stringify(response.areas));

                            // Success message with dismissible alert
                            var successFlash = '<div class="alert alert-success alert-dismissible fade show" role="alert">' +
                                               'Areas refreshed successfully!' +
                                               '<button type="button" class="close" data-dismiss="alert" aria-label="Close">' +
                                               '<span aria-hidden="true">&times;</span>' +
                                               '</button>' +
                                               '</div>';
                            $('.alert-container').append(successFlash);
                        } else {
                            // Error message with dismissible alert
                            var errorFlash = '<div class="alert alert-danger alert-dismissible fade show" role="alert">' +
                                             'Error: ' + response.error +
                                             '<button type="button" class="close" data-dismiss="alert" aria-label="Close">' +
                                             '<span aria-hidden="true">&times;</span>' +
                                             '</button>' +
                                             '</div>';
                            $('.alert-container').append(errorFlash);
                        }
                    },
                    error: function() {
                        var errorFlash = '<div class="alert alert-danger alert-dismissible fade show" role="alert">' +
                                         'Failed to refresh areas.' +
                                         '<button type="button" class="close" data-dismiss="alert" aria-label="Close">' +
                                         '<span aria-hidden="true">&times;</span>' +
                                         '</button>' +
                                         '</div>';
                        $('.alert-container').append(errorFlash);
                    }
                });
            });
        });
    </script>

</body>
</html>
