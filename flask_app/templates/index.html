<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Map Admin</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="#">BTC Map Admin</a>
        <div class="ml-auto">
            {% if session.get('api_key') %}
                <a href="{{ url_for('logout') }}" class="btn btn-outline-danger">Logout</a>
            {% else %}
                <a href="{{ url_for('login') }}" class="btn btn-outline-success">Login</a>
            {% endif %}
        </div>
    </nav>

    <div class="container text-center mt-5">
        <h1>Welcome to BTC Map Admin Web App</h1>

        {% if session.get('api_key') %}
            <a href="{{ url_for('select_area') }}" class="btn btn-primary">Select Area</a>
        {% else %}
            <p>Please log in with your API key to continue.</p>
            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="api_key">API Key</label>
                    <input type="text" class="form-control" id="api_key" name="api_key" required>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
        {% endif %}
    </div>
</body>
</html>
