{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="container" style="max-width: 520px; margin-top: 40px;">
    <h1 class="h3 mb-4 text-center font-weight-normal">Sign in</h1>

    <div id="login-status" class="alert" role="alert" style="display: none;"></div>

    <div class="card mb-4">
        <div class="card-header"><strong>Nostr</strong></div>
        <div class="card-body text-center">
            <button id="nostr-login-btn" class="btn btn-lg btn-primary btn-block mb-3" type="button">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="vertical-align: middle; margin-right: 8px;">
            <path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-10-5z"/>
        </svg>
        Sign in with Nostr
            </button>
            <div class="alert alert-info text-left mb-0" style="font-size: 0.9rem;">
                <strong>Requirements:</strong>
                <ul class="mb-0">
                    <li>Install a Nostr browser extension (e.g., <a href="https://getalby.com" target="_blank" rel="noopener noreferrer">Alby</a>, <a href="https://github.com/fiatjaf/nos2x" target="_blank" rel="noopener noreferrer">nos2x</a>)</li>
                    <li>Allow the extension to sign authentication requests</li>
                </ul>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header"><strong>BTC Map Account</strong></div>
        <div class="card-body">
            <form id="btcmap-login-form" novalidate>
                <div class="form-group mb-3">
                    <label for="btcmap_username" class="form-label">Username</label>
                    <input type="text" id="btcmap_username" class="form-control" required>
                </div>
                <div class="form-group mb-3">
                    <label for="btcmap_password" class="form-label">Password</label>
                    <input type="password" id="btcmap_password" class="form-control" required>
                </div>
                <button id="btcmap-login-btn" class="btn btn-outline-primary w-100" type="submit">Sign in with BTC Map credentials</button>
            </form>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const loginBtn = document.getElementById('nostr-login-btn');
    const btcmapForm = document.getElementById('btcmap-login-form');
    const btcmapBtn = document.getElementById('btcmap-login-btn');
    const statusDiv = document.getElementById('login-status');
    
    function showStatus(message, type) {
        statusDiv.textContent = message;
        statusDiv.className = `alert alert-${type}`;
        statusDiv.style.display = 'block';
    }
    
    function hideStatus() {
        statusDiv.style.display = 'none';
    }
    
    async function performNostrLogin() {
        try {
            hideStatus();
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm mr-2"></span>Connecting...';
            
            // Check if Nostr extension is available
            if (!window.nostr) {
                showStatus('No Nostr extension detected. Please install Alby, nos2x, or another NIP-07 compatible extension.', 'warning');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="vertical-align: middle; margin-right: 8px;"><path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-10-5z"/></svg>Sign in with Nostr';
                return;
            }
            
            // Get public key
            showStatus('Getting public key from extension...', 'info');
            const pubkey = await window.nostr.getPublicKey();
            
            showStatus('Preparing authentication...', 'info');
            const loginUrl = `${window.location.origin}/auth/nostr/login`;
            
            // Create NIP-98 event (kind 27235)
            showStatus('Waiting for signature from extension...', 'info');
            const event = {
                kind: 27235,  // NIP-98 HTTP Auth
                created_at: Math.floor(Date.now() / 1000),
                tags: [
                    ['u', loginUrl],
                    ['method', 'POST']
                ],
                content: '',  // Empty content for NIP-98
                pubkey: pubkey
            };
            
            // Sign the event
            const signedEvent = await window.nostr.signEvent(event);
            
            // Verify with server
            showStatus('Verifying signature...', 'info');
            const verifyResp = await fetch('/auth/nostr/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    event: signedEvent
                })
            });
            
            const verifyData = await verifyResp.json();
            
            if (!verifyResp.ok) {
                throw new Error(verifyData.error || 'Authentication failed');
            }
            
            if (verifyData.success) {
                showStatus('Authentication successful! Redirecting...', 'success');
                
                // Check if user needs to set RPC token
                if (!verifyData.has_token) {
                    setTimeout(() => {
                        window.location.href = '/profile?first_login=1';
                    }, 1000);
                } else {
                    setTimeout(() => {
                        window.location.href = '/select_area';
                    }, 1000);
                }
            } else {
                throw new Error('Authentication failed');
            }
            
        } catch (error) {
            console.error('Login error:', error);
            let errorMsg = error.message || 'Unknown error';
            
            // Add more context for common errors
            if (errorMsg.includes('Failed to fetch')) {
                errorMsg = 'Cannot connect to server. Please ensure the server is running and try again.';
            } else if (errorMsg.includes('window.nostr')) {
                errorMsg = 'Nostr extension error. Please check your extension settings.';
            }
            
            showStatus(`Error: ${errorMsg}`, 'danger');
            loginBtn.disabled = false;
            loginBtn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="vertical-align: middle; margin-right: 8px;"><path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-10-5z"/></svg>Sign in with Nostr';
        }
    }

    async function performBtcmapLogin(event) {
        event.preventDefault();
        const username = document.getElementById('btcmap_username').value.trim();
        const password = document.getElementById('btcmap_password').value;

        if (!username || !password) {
            showStatus('Username and password are required.', 'warning');
            return;
        }

        try {
            btcmapBtn.disabled = true;
            btcmapBtn.textContent = 'Signing in...';
            showStatus('Creating BTC Map API key...', 'info');

            const resp = await fetch('/auth/btcmap/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            });

            const data = await resp.json();
            if (!resp.ok) {
                throw new Error(data.error || 'BTC Map login failed');
            }

            showStatus('Authentication successful! Redirecting...', 'success');
            setTimeout(() => {
                window.location.href = '/select_area';
            }, 1000);
        } catch (error) {
            showStatus(`Error: ${error.message || 'BTC Map login failed'}`, 'danger');
        } finally {
            btcmapBtn.disabled = false;
            btcmapBtn.textContent = 'Sign in with BTC Map credentials';
        }
    }
    
    loginBtn.addEventListener('click', performNostrLogin);
    btcmapForm.addEventListener('submit', performBtcmapLogin);
});
</script>
{% endblock %}
